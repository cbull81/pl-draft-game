{% extends "base.html" %}
{% block title %}Error — Tacticos &amp; Galacticos{% endblock %}
{% block content %}
<div style="min-height:100vh; display:flex; flex-direction:column;
            align-items:center; justify-content:center; padding:3rem 1.5rem;">
  <div style="width:100%; max-width:480px; background:#fff; border-radius:10px;
              padding:2rem; border:2px solid #fca5a5;
              box-shadow:4px 4px 0 rgba(239,68,68,0.2); text-align:center;">
    <div class="font-pixel" style="font-size:9px; color:#b91c1c; letter-spacing:0.15em;
                                    margin-bottom:1rem;">SOMETHING WENT WRONG</div>
    {% if detail %}
    <p style="font-size:13px; color:#6b7280; margin-bottom:1.5rem; font-family:monospace;
              background:#f9fafb; padding:10px 14px; border-radius:6px;
              border:1px solid #e5e7eb; text-align:left; word-break:break-word;">
      {{ detail }}
    </p>
    {% endif %}
    <a href="/" class="font-pixel"
       style="font-size:7px; color:var(--navy); text-decoration:none;
              border:2px solid var(--navy); padding:10px 20px; border-radius:4px;
              box-shadow:3px 3px 0 var(--sh); display:inline-block;">
      ← START OVER
    </a>
  </div>
</div>
{% endblock %}
